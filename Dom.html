<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student List DOM Practice</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: #f5f7fb;
      padding: 30px;
      color: #222;
    }

    h1{
      text-align: center;
      margin-bottom: 20px;
      color: #1f2a44;
    }

    #student-form{
      max-width: 700px;
      margin: 0 auto 25px;
      background: #fff;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    #student-form label{
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    #student-form input{
      width: 190px;
      padding: 10px 12px;
      border: 1px solid #cfd7e6;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    #student-form input:focus{
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    #student-form button{
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #student-form button:hover{
      background: #2563eb;
    }

    #student-list{
      max-width: 700px;
      margin: 0 auto;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .student-item{
      background: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .student-item span{
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      flex: 1;
    }

    .student-item button{
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      font-size: 13px;
    }

    .btn-edit{
      background: #f59e0b;
      color: #fff;
    }
    .btn-edit:hover{
      background: #d97706;
    }

    .btn-delete{
      background: #ef4444;
      color: #fff;
    }
    .btn-delete:hover{
      background: #dc2626;
    }

    @media (max-width: 650px){
      #student-form{
        flex-direction: column;
        align-items: stretch;
      }
      #student-form input{
        width: 100%;
      }
      #student-form button{
        width: 100%;
      }
      .student-item{
        flex-direction: column;
        align-items: stretch;
      }
      .student-item button{
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <h1>Student List</h1>

  <form id="student-form">
    <label for="student-roll">Roll No:</label>
    <input type="text" id="student-roll" placeholder="Enter roll no">

    <label for="student-name">Student Name:</label>
    <input type="text" id="student-name" placeholder="Enter student name">

    <button type="submit">Add Student</button>
  </form>

  <ul id="student-list"></ul>

  <script src="dom.js"></script>
</body>
</html>
